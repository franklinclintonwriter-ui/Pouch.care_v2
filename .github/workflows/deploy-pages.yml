name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
      - 'claude/**' # deploy a preview from the working branch
  workflow_dispatch: {}

# Only one deploy at a time per branch.
concurrency:
  group: pages-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Build & deploy (Cloudflare Pages)
    runs-on: ubuntu-latest
    environment:
      name: cloudflare-pages
      url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for Cloudflare Pages
        run: npm run pages:build
        env:
          # Canonical URL used in metadata / sitemap / OG images.
          NEXT_PUBLIC_SITE_URL: https://pouch.care

      # Ensure the Pages project exists (idempotent — ignores "already exists").
      - name: Ensure Pages project
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages project create pouch-care \
            --production-branch=main 2>/dev/null || true

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy .vercel/output/static
            --project-name=pouch-care
            --branch=${{ github.ref_name }}
            --commit-dirty=true

      - name: Deployment summary
        run: |
          echo "### Cloudflare Pages deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: ${{ steps.deploy.outputs.deployment-url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch: \`${{ github.ref_name }}\`" >> "$GITHUB_STEP_SUMMARY"
