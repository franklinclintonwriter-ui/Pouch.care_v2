name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main # production deploy on merge to main
  workflow_dispatch: {} # manual deploy / preview on demand

# Only one deploy at a time per ref.
concurrency:
  group: pages-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Build & deploy (Cloudflare Pages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for Cloudflare Pages
        run: npm run pages:build
        env:
          # Canonical URL used in metadata / sitemap / OG images.
          NEXT_PUBLIC_SITE_URL: https://pouch.care

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          # NOTE: repository secrets — must match the names configured in
          # Settings → Secrets and variables → Actions.
          apiToken: ${{ secrets.CF_API_KEY }}
          accountId: ${{ secrets.CF_ACC_ID }}
          command: >-
            pages deploy .vercel/output/static
            --project-name=pouch-care
            --branch=main
            --commit-dirty=true

      - name: Deployment summary
        run: |
          echo "### Cloudflare Pages deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: ${{ steps.deploy.outputs.deployment-url }}" >> "$GITHUB_STEP_SUMMARY"
